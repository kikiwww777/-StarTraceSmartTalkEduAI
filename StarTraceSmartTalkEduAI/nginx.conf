# Nginx 反向代理配置
# 将 EduAI Studio 和 Sim Studio 统一到同一域名下
# 开发环境：前端运行在 5173，Sim Studio 运行在 3000
# 生产环境：前端可能运行在 3001（构建后的静态文件）或通过其他方式部署

# HTTP 服务器（开发环境）
server {
    listen 80;
    server_name localhost eduai.example.com;

    # 重定向到 HTTPS（生产环境启用）
    # return 301 https://$server_name$request_uri;
    
    # 后端 API 代理（EduAI 后端）
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS 支持（如果需要）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-User-Id" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Sim Studio 子路径（必须放在 / 之前，因为 location 匹配优先级）
    # 注意：需要配置 Sim Studio 的 NEXT_PUBLIC_BASE_PATH=/sim 环境变量
    # 这样 Next.js 会自动在所有路径前添加 /sim 前缀
    location /sim {
        # 对于 /sim（没有尾部斜杠），重定向到 /sim/
        rewrite ^/sim$ /sim/ permanent;
    }
    
    location /sim/ {
        # 直接代理到 Sim Studio，不移除 /sim 前缀
        # 因为 Next.js 配置了 basePath: '/sim'，它会自动处理路径
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（Sim 使用 Socket.io）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 移除 Sim 原有的 X-Frame-Options 头（如果存在）
        proxy_hide_header X-Frame-Options;

        # 替换 CSP 头，允许被同域 iframe 嵌入
        # 移除原有的 CSP 头
        proxy_hide_header Content-Security-Policy;
        # 添加新的 CSP 头，允许同域嵌入（'self' 表示同源，即同一域名）
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # EduAI Studio 主应用（开发环境：Vite dev server 在 5173）
    # 生产环境：如果前端构建后部署在 3001，则改为 proxy_pass http://127.0.0.1:3001;
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（Vite HMR）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

